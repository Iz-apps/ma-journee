<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ma Journée - Planificateur quotidien personnel">
  <meta name="theme-color" content="#6c63ff">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Ma Journée ✨</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f8f9fa;
      --text: #1a1a1a;
      --sub: #666;
      --primary: #6c63ff;
      --border: #e0e0e0;
      --radius: 16px;
      --matin: #f59e0b;
      --aprem: #10b981;
      --soir: #8b5cf6;
    }
    body.dark {
      --bg: #1a1a1a;
      --card: #2a2a2a;
      --text: #fff;
      --sub: #aaa;
      --border: #444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    #root {
      max-width: 900px;
      margin: 0 auto;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
      color: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    button {
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      padding: 8px 16px;
      background: var(--card);
      color: var(--text);
      transition: all 0.2s;
    }
    button:active { transform: scale(0.98); }
    button.icon {
      width: 40px;
      padding: 8px;
      font-size: 18px;
      background: rgba(255,255,255,0.2);
      color: white;
      border-radius: 50%;
    }
    button.icon:hover { background: rgba(255,255,255,0.3); }
    button.primary {
      background: var(--primary);
      color: white;
    }
    button.primary:hover { background: #5a52cc; }
    .nav-tabs {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--card);
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
    }
    .nav-tab {
      padding: 8px 16px;
      border-radius: 8px;
      background: transparent;
      color: var(--sub);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .nav-tab.active {
      background: var(--primary);
      color: white;
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card-header {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--matin), var(--aprem), var(--soir));
      transition: width 0.3s;
    }
    .period-label {
      font-weight: 600;
      font-size: 14px;
      margin-top: 12px;
      margin-bottom: 8px;
      color: var(--primary);
    }
    .task-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      align-items: flex-start;
    }
    .task-controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .task-controls button {
      width: 28px;
      padding: 4px;
      font-size: 12px;
      background: var(--border);
    }
    .task-checkbox {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      background: transparent;
      cursor: pointer;
      font-size: 20px;
      flex-shrink: 0;
    }
    .task-checkbox.checked {
      background: var(--primary);
      color: white;
    }
    .task-content {
      flex: 1;
    }
    .task-name {
      font-weight: 500;
      margin-bottom: 4px;
    }
    .task-name.done {
      text-decoration: line-through;
      color: var(--sub);
    }
    .task-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .task-actions button {
      padding: 4px 8px;
      font-size: 12px;
      width: auto;
      background: var(--border);
    }
    .med-badge {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 4px;
    }
    .med-value-form {
      background: var(--bg);
      border: 2px solid var(--primary);
      border-radius: 12px;
      padding: 12px;
      margin-top: 8px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--sub);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .inline-textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--primary);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      min-height: 80px;
      resize: vertical;
    }
    .date-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .date-nav button {
      width: 40px;
      padding: 8px;
    }
    .date-display {
      text-align: center;
      font-weight: 600;
      font-size: 16px;
    }
    .todo-section {
      background: linear-gradient(135deg, #fbbf24 0%, #a855f7 100%);
      color: white;
      padding: 16px;
      border-radius: var(--radius);
      margin-bottom: 12px;
    }
    .todo-section .card-header {
      color: white;
      margin-bottom: 16px;
    }
    .todo-add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .todo-add-row input {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      color: var(--text);
      font-size: 14px;
    }
    .todo-add-row select {
      padding: 10px 8px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      color: var(--text);
      font-size: 13px;
    }
    .todo-add-row button {
      background: rgba(255,255,255,0.9);
      color: var(--text);
      padding: 10px 16px;
      font-weight: 600;
    }
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .todo-item {
      background: rgba(255,255,255,0.95);
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .todo-priority-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .todo-priority-badge.normal { background: #d1d5db; color: #374151; }
    .todo-priority-badge.urgent { background: #ef4444; color: white; }
    .todo-priority-badge.important { background: #f97316; color: white; }
    .todo-item-content {
      flex: 1;
    }
    .todo-item-text {
      font-weight: 500;
      margin-bottom: 4px;
    }
    .todo-item-dates {
      font-size: 12px;
      color: var(--sub);
    }
    .todo-item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .todo-item-actions button {
      width: 32px;
      height: 32px;
      padding: 4px;
      font-size: 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .todo-done-item {
      opacity: 0.6;
      text-decoration: line-through;
    }
    .journal-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .journal-header {
      font-weight: 600;
      margin-bottom: 12px;
      cursor: pointer;
      user-select: none;
    }
    .journal-body {
      display: none;
    }
    .journal-body.open {
      display: block;
    }
    .journal-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .journal-row.full {
      grid-template-columns: 1fr;
    }
    .schedule-badge {
      display: inline-block;
      background: rgba(108, 99, 255, 0.1);
      color: var(--primary);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-left: 8px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .cal-day:hover { background: var(--card); }
    .cal-dots {
      display: flex;
      gap: 3px;
      justify-content: center;
      margin-top: 4px;
    }
    .cal-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .cal-dot.blue { background: var(--primary); }
    .cal-dot.purple { background: #e879f9; }
    .cal-dot.red { background: #ef4444; }
    .histo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .histo-table th {
      background: var(--card);
      padding: 8px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .histo-table td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
    }
    .histo-val {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .histo-val.ok { background: #dcfce7; color: #166534; }
    .histo-val.warn { background: #fed7aa; color: #92400e; }
    .histo-val.bad { background: #fecaca; color: #991b1b; }
    .histo-val.neu { background: var(--border); color: var(--sub); }
    .humeur-btn {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .humeur-btn.selected {
      border-color: var(--primary);
      background: rgba(108, 99, 255, 0.1);
    }
    .sante-notes {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      min-height: 100px;
      resize: vertical;
    }
    .config-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .config-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .config-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .config-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .config-checkbox {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }
    .config-details {
      flex: 1;
    }
    .config-name {
      font-weight: 500;
      margin-bottom: 6px;
    }
    .config-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .config-controls select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
    }
    .config-days {
      display: flex;
      gap: 4px;
    }
    .config-day-btn {
      width: 32px;
      height: 32px;
      padding: 4px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--sub);
      cursor: pointer;
      transition: all 0.2s;
    }
    .config-day-btn.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .config-day-btn:hover { border-color: var(--primary); }
    .config-custom-input {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .config-custom-input input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    .config-custom-input button {
      padding: 8px 16px;
    }
    .sub-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .sub-tab {
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--sub);
      cursor: pointer;
      font-weight: 500;
      flex-shrink: 0;
    }
    .sub-tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .day-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .day-card-header {
      font-weight: 600;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .day-card-body {
      display: none;
    }
    .day-card-body.open {
      display: block;
    }
    .meal-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }
    .meal-row input {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const JOURS_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const JOURS_COURT = ['D','L','M','M','J','V','S'];

    const MOIS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    const CATEGORIES = {fruits:'🥦 Fruits & Légumes', viande:'🥩 Viandes', fromage:'🧀 Laitiers', epice:'🥫 Épicerie', autre:'🛍️ Autres'};
    const MEALS = {dej:'🌅 Déj.', diner:'☀️ Dîner', souper:'🌙 Souper'};

    const MED_TASKS = {

    const DEFAULT_TASKS = {

    function todayKey() {
      var d = new Date();
      return keyFromDate(d);
    }

    function keyFromDate(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth()+1).padStart(2,'0');
      var day = String(d.getDate()).padStart(2,'0');
      return y+'-'+m+'-'+day;
    }

    function dateFromKey(k) {
      var p = k.split('-');
      return new Date(p[0], p[1]-1, p[2]);
    }

    function shiftDay(key, n) {
      var d = dateFromKey(key);
      d.setDate(d.getDate() + n);
      return keyFromDate(d);
    }

    function formatLong(key) {
      var d = dateFromKey(key);
      var dow = JOURS_FULL[d.getDay()];
      return dow+' '+d.getDate()+' '+MOIS_FR[d.getMonth()];
    }

    function formatShort(key) {
      var d = dateFromKey(key);
      return JOURS_COURT[d.getDay()]+' '+d.getDate();
    }

    function mondayOfWeek(key) {
      var d = dateFromKey(key);
      var dow = d.getDay();
      var delta = dow === 0 ? -6 : 1-dow;
      d.setDate(d.getDate() + delta);
      return keyFromDate(d);
    }

    function esc(s) {
      var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
      return s.replace(/[&<>"']/g, function(c){ return m[c]; });
    }

    function taskMatchesDay(taskId, dateKey) {
      var freq = ST.taskFreq[taskId] || 'Quotidien';
      if (freq === 'Quotidien') return true;
      var d = dateFromKey(dateKey);
      var dow = d.getDay();
      if (freq === 'Sem.') return dow >= 1 && dow <= 5;
      if (freq === 'W-E') return dow === 0 || dow === 6;
      if (freq === 'Perso') {
        var k = taskId + '_days';
        var d = ST.taskFreq[k] || {};
        return !!d[dow];
      }
      return true;
    }

    function getActiveByPeriod(period, dateKey) {
      var r = [];
      var allTasks = {};
      Object.keys(DEFAULT_TASKS).forEach(function(cat){
        DEFAULT_TASKS[cat].forEach(function(t){
          allTasks[t.id] = t;
        });
      });
      Object.keys(allTasks).forEach(function(id){
        if (!taskMatchesDay(id, dateKey)) return;
        var p = ST.activeTasks[id] || DEFAULT_TASKS[allTasks[id].defPeriod ? Object.keys(DEFAULT_TASKS).find(function(c){return DEFAULT_TASKS[c].some(function(t){return t.id===id;});}) : 'matin'].find(function(t){return t.id===id;}).defPeriod;
        if (p === period) r.push(id);
      });
      (ST.customTasks[period] || []).forEach(function(id){
        if (taskMatchesDay(id, dateKey)) r.push(id);
      });
      var ord = function(id){ return ST.taskOrder[id] || 0; };
      r.sort(function(a,b){ return ord(a) - ord(b); });
      return r;
    }

    function moveTask(id, dir) {
      var o = ST.taskOrder[id] || 0;
      ST.taskOrder[id] = o + (dir > 0 ? 10 : -10);
      saveSt();
    }

    function toggleComp(id, dateKey) {
      if (!ST.completions[dateKey]) ST.completions[dateKey] = {};
      ST.completions[dateKey][id] = !ST.completions[dateKey][id];

    function saveNote(id, txt, dateKey) {

    function deleteNote(id, dateKey) {

      delete ST.notes[dateKey][id];
      saveSt();
    }

    function toggleTask(id) {
      if (ST.activeTasks[id] === undefined) {
        var defP = 'matin';
        Object.keys(DEFAULT_TASKS).some(function(c){
          var t = DEFAULT_TASKS[c].find(function(x){return x.id===id;});
          if (t) { defP = t.defPeriod; return true; }
          return false;
        });
        ST.activeTasks[id] = defP;
      } else {
        delete ST.activeTasks[id];
      }
      saveSt();
    }

    function setPeriod(id, p) {

    function setFreq(id, freq) {
      ST.taskFreq[id] = freq;

      saveSt();

    function toggleFreqDay(id, dow) {

      ST.taskFreq[id+'_days'][dow] = !ST.taskFreq[id+'_days'][dow];

    function bulkToggle(period, allOn) {

            if (allOn) ST.activeTasks[t.id] = period;
            else delete ST.activeTasks[t.id];
          }
        });

    function renderToday() {
      var key = ST.activeDay;
      var d = dateFromKey(key);
      var doneCount = Object.keys(ST.completions[key] || {}).length;
      var allTasks = [];

      });
      allTasks = allTasks.concat(ST.customTasks.matin || []).concat(ST.customTasks.aprem || []).concat(ST.customTasks.soir || []);
      allTasks = allTasks.filter(function(id, i, arr){ return arr.indexOf(id)===i; });
      var total = allTasks.length;
      var pct = total > 0 ? Math.round(100 * doneCount / total) : 0;

      var h = '<div class="date-nav">' +
        '<button onclick="shiftActiveDay(-1)">←</button>' +

        '</div>';

      h += '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';

      var periods = ['matin','aprem','soir'];
      var periodLabels = ['🌅 Matin', '☀️ Après-midi', '🌙 Soir'];
      periods.forEach(function(p, i){
        var tasks = getActiveByPeriod(p, key);
        h += '<div class="period-label">'+periodLabels[i]+' ('+tasks.length+')</div>';
        tasks.forEach(function(id){
          var t = {};
          Object.keys(DEFAULT_TASKS).forEach(function(cat){
            var ft = DEFAULT_TASKS[cat].find(function(x){return x.id===id;});
            if (ft) t = ft;
          });
          if (!t.name && ST.customTasks[p]) {
            var ct = ST.customTasks[p].indexOf(id);
            if (ct >= 0) t = {id, emoji: '⭐', name: 'Custom'};
          }
          var isDone = ST.completions[key] && ST.completions[key][id];
          var noteText = ST.notes[key] && ST.notes[key][id];
          var showNoteForm = ST.medValueOpen['note_'+id];

          h += '<div class="task-card">';

          h += '<button class="task-checkbox '+(isDone?'checked':'')+'" onclick="toggleComp(\''+id+'\',\''+key+'\')">'+
            (isDone ? '✓' : '') + '</button>';
          h += '<div class="task-content">';
          h += '<div class="task-name '+(isDone?'done':'')+'">'+t.emoji+' '+esc(t.name||'?')+'</div>';

          var medVal = null;
          if (isMed && ST.sante[key]) {
            var mt = MED_TASKS[id];
            if (mt.type === 'tension') {
              var s = ST.sante[key].tension_s;
              var d = ST.sante[key].tension_d;
              if (s && d) medVal = s + '/' + d + ' ' + mt.unit;
            } else if (mt.field) {
              var v = ST.sante[key][mt.field];
              if (v !== undefined && v !== null && v !== '') medVal = v + ' ' + mt.unit;
            }
          }
          if (medVal) h += '<span class="med-badge">📊 '+medVal+'</span>';

          h += '<div class="task-actions">';
          h += '<button onclick="toggleNote(\''+id+'\')">📝</button>';

          if (showNoteForm) {

            h += '</div></div>';
          }

          if (showMedForm && MED_TASKS[id]) {
            var mt = MED_TASKS[id];

              h += '<input type="number" id="med_'+id+'_d" value="'+(ST.sante[key]?.tension_d||'')+'" placeholder="ex: 80"></div>';

    function renderWeek() {
      var h = '<div style="margin-bottom:16px;">';
      h += '<label>Jours: </label>';
      [3,7,14,30].forEach(function(d){
        h += '<button onclick="setWeekDays('+d+')" '+(ST.weekDays===d?'style="background:var(--primary); color:white;"':'')+'> '+d+' </button>';
      });
      h += '</div>';

      var monday = mondayOfWeek(todayKey());
      var startKey = shiftDay(monday, ST.weekOffset * 7);
      h += '<div class="date-nav">';
      h += '<button onclick="navWeek(-1)">←</button>';
      h += '<div class="date-display">'+formatShort(startKey)+'</div>';
      h += '<button onclick="navWeek(1)">→</button>';
      h += '</div>';

      for (var i = 0; i < ST.weekDays; i++) {
        var dayKey = shiftDay(startKey, i);
        var isOpen = ST.medValueOpen['daycard_'+dayKey];
        var d = dateFromKey(dayKey);
        var dow = JOURS_2[d.getDay()];

        h += '<div class="day-card">';
        h += '<div class="day-card-header" onclick="toggleDayCard(\''+dayKey+'\')">'+dow+' '+d.getDate()+' '+(isOpen?'▼':'▶')+'</div>';
        h += '<div class="day-card-body '+(isOpen?'open':'')+'">';

        var periods = ['matin','aprem','soir'];
        var periodLabels = ['🌅','☀️','🌙'];
        periods.forEach(function(p, pi){
          var tasks = getActiveByPeriod(p, dayKey);
          if (tasks.length > 0) {
            h += '<div style="margin-bottom:12px;">';
            h += '<div style="font-weight:600; font-size:13px; margin-bottom:6px;">'+periodLabels[pi]+'</div>';
            tasks.forEach(function(id){
              var t = {};
              Object.keys(DEFAULT_TASKS).forEach(function(cat){
                var ft = DEFAULT_TASKS[cat].find(function(x){return x.id===id;});
                if (ft) t = ft;
              });
              var isDone = ST.completions[dayKey] && ST.completions[dayKey][id];
              h += '<div style="display:flex; gap:8px; margin-bottom:6px; padding:8px; background:var(--bg); border-radius:6px;">';

              h += '</div>';
            });
            h += '</div>';
          }
        });

        h += '</div></div>';
      }

      return h;
    }

    function renderSante() {
      var h = '<div class="sub-tabs">';
      h += '<div class="sub-tab '+(ST.santeView==='form'?'active':'')+'\" onclick="setSanteView(\'form\')">📋 Saisie</div>';
      h += '<div class="sub-tab '+(ST.santeView==='cal'?'active':'')+'\" onclick="setSanteView(\'cal\')">📅 Calendrier</div>';

        h += '<div class="date-nav" style="margin-bottom:16px;">';
        h += '<button onclick="shiftSanteDate(-1)">←</button>';
        h += '<div class="date-display">'+formatLong(dateKey)+'</div>';

        h += '</div>';

        h += '<div class="card-header">📊 Mesures corporelles</div>';
        h += '<div class="form-group"><label>⚖️ Poids (kg)</label><input type="number" step="0.1" value="'+(s.poids||'')+'" placeholder="ex: 65.0" onchange="saveSante(\''+dateKey+'\',\'poids\',this.value)"></div>';
        h += '<div class="form-group"><label>💉 Tension (mmHg)</label>';
        h += '<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">';
        h += '<input type="number" placeholder="Sys." value="'+(s.tension_s||'')+'" onchange="saveSante(\''+dateKey+'\',\'tension_s\',this.value)">';
        h += '<input type="number" placeholder="Dia." value="'+(s.tension_d||'')+'" onchange="saveSante(\''+dateKey+'\',\'tension_d\',this.value)">';
        h += '</div></div>';
        h += '<div class="form-group"><label>🩸 Glycémie (mmol/L)</label><input type="number" step="0.1" value="'+(s.glycemie||'')+'" placeholder="ex: 5.5" onchange="saveSante(\''+dateKey+'\',\'glycemie\',this.value)"></div>';
        h += '<div class="form-group"><label>🫀 Saturation O₂ (%)</label><input type="number" value="'+(s.sato2||'')+'" placeholder="ex: 98" onchange="saveSante(\''+dateKey+'\',\'sato2\',this.value)"></div>';
        h += '<div class="form-group"><label>🌡️ Température (°C)</label><input type="number" step="0.1" value="'+(s.temp||'')+'" placeholder="ex: 37.0" onchange="saveSante(\''+dateKey+'\',\'temp\',this.value)"></div>';
        h += '<div class="form-group"><label>❤️ Fréquence cardiaque (bpm)</label><input type="number" value="'+(s.fc||'')+'" placeholder="ex: 70" onchange="saveSante(\''+dateKey+'\',\'fc\',this.value)"></div>';
        h += '</div>';

        h += '<div class="card">';
        h += '<div class="card-header">🌟 Bien-être</div>';
        h += '<div class="form-group"><label>💤 Sommeil (h)</label><input type="number" step="0.5" value="'+(s.sommeil||'')+'" placeholder="ex: 8" onchange="saveSante(\''+dateKey+'\',\'sommeil\',this.value)"></div>';
        h += '<div class="form-group"><label>🤕 Douleur (0-10)</label><input type="number" min="0" max="10" value="'+(s.douleur||'')+'" onchange="saveSante(\''+dateKey+'\',\'douleur\',this.value)"></div>';
        h += '<div class="form-group"><label>😊 Humeur du jour</label>';
        h += '<div style="display:flex; gap:8px; margin-top:8px;">';
        HUMEURS.forEach(function(emoji, idx){
          var selected = s.humeur === idx;
          h += '<button class="humeur-btn '+(selected?'selected':'')+'" onclick="saveSanteHumeur(\''+dateKey+'\','+idx+')">'+emoji+'</button>';
        });
        h += '</div></div>';
        h += '<div class="form-group"><label>Notes</label><textarea class="sante-notes" onchange="saveSante(\''+dateKey+'\',\'notesSante\',this.value)">'+esc(s.notesSante||'')+'</textarea></div>';
        h += '</div>';

        h += '<div class="card">';
        h += '<div class="card-header">💊 Médicaments</div>';
        var meds = ST.medLogs[dateKey] || [];
        if (meds.length > 0) {
          h += '<div style="font-size:13px;">';
          meds.forEach(function(m){
            h += '<div style="padding:8px; background:var(--bg); border-radius:6px; margin-bottom:6px;">'+esc(m.name)+' '+esc(m.dose)+' à '+esc(m.time)+'</div>';
          });
          h += '</div>';
        } else {
          h += '<p style="color:var(--sub); font-size:13px;">Utilisez l\'onglet Jour pour ajouter des médicaments</p>';
        }
        h += '</div>';
      } else if (ST.santeView === 'cal') {
        var monthStr = ST.santeMonth || formatLong(todayKey()).substr(0, 7);
        var m = parseInt(monthStr.substr(5, 2));
        var y = parseInt(monthStr.substr(0, 4));
        var firstDay = new Date(y, m-1, 1);
        var lastDay = new Date(y, m, 0);
        var firstDow = firstDay.getDay();
        var totalDays = lastDay.getDate();

        h += '<div style="margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;">';
        h += '<button onclick="var nm=new Date('+y+','+(m-2)+',1); santeCalNav(nm.getFullYear()+\'-\'+String(nm.getMonth()+1).padStart(2,\'0\')+\'-01\');">←</button>';
        h += '<span style="font-weight:600;">'+MOIS_FR[m-1]+' '+y+'</span>';
        h += '<button onclick="var nm=new Date('+y+','+(m)+',1); santeCalNav(nm.getFullYear()+\'-\'+String(nm.getMonth()+1).padStart(2,\'0\')+\'-01\');">→</button>';
        h += '</div>';

        h += '<div class="cal-grid">';
        JOURS_COURT.forEach(function(d){
          h += '<div style="text-align:center; font-weight:600; font-size:12px; padding:8px;">'+d+'</div>';
        });
        for (var i = 0; i < firstDow; i++) h += '<div></div>';
        for (var d = 1; d <= totalDays; d++) {
          var key = y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
          var hasMeas = ST.sante[key] && (ST.sante[key].poids || ST.sante[key].tension_s || ST.sante[key].glycemie);
          var hasMeds = ST.medLogs[key] && ST.medLogs[key].length > 0;
          var pain = ST.sante[key]?.douleur;
          var highPain = pain && parseInt(pain) >= 7;

          h += '<div class="cal-day" onclick="santeCalSelect(\''+key+'\')" style="cursor:pointer;">';
          h += '<div>'+d+'</div>';
          h += '<div class="cal-dots">';
          if (hasMeas) h += '<div class="cal-dot blue"></div>';
          if (hasMeds) h += '<div class="cal-dot purple"></div>';
          if (highPain) h += '<div class="cal-dot red"></div>';
          h += '</div>';
          h += '</div>';
        }
        h += '</div>';
      } else {
        var entries = [];
        Object.keys(ST.sante).forEach(function(k){
          entries.push({date: k, data: ST.sante[k]});
        });
        entries.sort(function(a,b){return dateFromKey(b.date).getTime() - dateFromKey(a.date).getTime();});
        entries = entries.slice(0, 60);

        h += '<div style="overflow-x:auto;">';
        h += '<table class="histo-table">';
        h += '<thead><tr><th>Date</th><th>Poids</th><th>Tension</th><th>Glyc.</th><th>O₂</th><th>FC</th><th>Douleur</th><th>Sommeil</th><th>Humeur</th><th>Méds</th></tr></thead>';
        h += '<tbody>';
        entries.forEach(function(e){
          var d = e.data;
          h += '<tr><td>'+formatShort(e.date)+'</td>';
          h += '<td>'+(d.poids ? '<span class="histo-val ok">'+d.poids+' kg</span>' : '-')+'</td>';
          h += '<td>'+(d.tension_s && d.tension_d ? '<span class="histo-val ok">'+d.tension_s+'/'+d.tension_d+'</span>' : '-')+'</td>';
          h += '<td>'+(d.glycemie ? (parseInt(d.glycemie)<4 || parseInt(d.glycemie)>8 ? '<span class="histo-val warn">'+d.glycemie+'</span>' : '<span class="histo-val ok">'+d.glycemie+'</span>') : '-')+'</td>';
          h += '<td>'+(d.sato2 ? (parseInt(d.sato2)<95 ? '<span class="histo-val bad">'+d.sato2+'%</span>' : '<span class="histo-val ok">'+d.sato2+'%</span>') : '-')+'</td>';
          h += '<td>'+(d.fc ? '<span class="histo-val '+(parseInt(d.fc)>100?'warn':'ok')+'">'+d.fc+'</span>' : '-')+'</td>';
          h += '<td>'+(d.douleur ? (parseInt(d.douleur)>=7 ? '<span class="histo-val bad">'+d.douleur+'/10</span>' : '<span class="histo-val ok">'+d.douleur+'/10</span>') : '-')+'</td>';
          h += '<td>'+(d.sommeil ? '<span class="histo-val '+(parseInt(d.sommeil)<6?'warn':'ok')+'">'+d.sommeil+'h</span>' : '-')+'</td>';
          h += '<td>'+(d.humeur !== undefined ? '<span class="histo-val neu">'+HUMEURS[d.humeur]+'</span>' : '-')+'</td>';
          h += '<td>'+(ST.medLogs[e.date] && ST.medLogs[e.date].length>0 ? '<span class="histo-val neu">'+ST.medLogs[e.date].length+'</span>' : '-')+'</td>';
          h += '</tr>';
        });
        h += '</tbody>';
        h += '</table>';
        h += '</div>';
      }

      return h;
    }

        h += '</div>';

        h += '<div class="config-items">';
        tasks.forEach(function(task){
          var isActive = !!ST.activeTasks[task.id];
          var freq = ST.taskFreq[task.id] || 'Quotidien';
          var freqDays = ST.taskFreq[task.id+'_days'] || {};

          h += '<div class="config-item">';
          h += '<input type="checkbox" class="config-checkbox" '+(isActive?'checked':'')+' onchange="toggleTask(\''+task.id+'\')">';
          h += '<div class="config-details">';
          h += '<div class="config-name">'+task.emoji+' '+esc(task.name)+'</div>';
          h += '<div class="config-controls">';
          h += '<select onchange="setPeriod(\''+task.id+'\',this.value)">';
          h += '<option value="matin" '+(ST.activeTasks[task.id]==='matin'?'selected':'')+'> 🌅 Matin</option>';
          h += '<option value="aprem" '+(ST.activeTasks[task.id]==='aprem'?'selected':'')+'> ☀️ Après-midi</option>';
          h += '<option value="soir" '+(ST.activeTasks[task.id]==='soir'?'selected':'')+'> 🌙 Soir</option>';
          h += '</select>';
          h += '<select onchange="setFreq(\''+task.id+'\',this.value)">';
          h += '<option value="Quotidien" '+(freq==='Quotidien'?'selected':'')+'> Quotidien</option>';
          h += '<option value="Sem." '+(freq==='Sem.'?'selected':'')+'> Sem.</option>';
          h += '<option value="W-E" '+(freq==='W-E'?'selected':'')+'> W-E</option>';
          h += '<option value="Perso" '+(freq==='Perso'?'selected':'')+'> Perso</option>';
          h += '</select>';

          if (freq === 'Sem.') {
            h += '<span class="schedule-badge">📅 Lundi au vendredi</span>';
          } else if (freq === 'W-E') {
            h += '<span class="schedule-badge">📅 Samedi et dimanche</span>';
          } else if (freq === 'Perso') {
            h += '<div class="config-days">';
            for (var d = 0; d < 7; d++) {
              var selected = !!freqDays[d];
              h += '<button class="config-day-btn '+(selected?'selected':'')+'" onclick="toggleFreqDay(\''+task.id+'\','+d+')" title="'+JOURS_FULL[d]+'">'+JOURS_COURT[d]+'</button>';
            }
            h += '</div>';
          }
          h += '</div>';
          h += '</div></div>';
        });

        h += '<div class="config-custom-input">';
        h += '<input type="text" id="custom_'+sec.key+'" placeholder="Ajouter une tâche personnalisée...">';
        h += '<button onclick="var txt=document.getElementById(\'custom_'+sec.key+'\').value; addCustomTask(\''+sec.key+'\',txt); document.getElementById(\'custom_'+sec.key+'\').value=\'\';">+</button>';
        h += '</div>';

        h += '</div></div>';
      });

      return h;
    }

    function render() {
      var html = '<div class="header">' +
        '<h1>Ma Journée ✨</h1>' +
        '<div class="header-actions">' +
        '<button class="icon" onclick="toggleDarkMode()" title="Thème">'+(ST.dark?'🌙':'☀️')+'</button>' +
        '</div>' +
        '</div>';

      html += '<div class="nav-tabs">' +
        '<div class="nav-tab '+(activeTab==='jour'?'active':'')+'" onclick="switchTab(\'jour\')">📅 Jour</div>' +
        '<div class="nav-tab '+(activeTab==='week'?'active':'')+'" onclick="switchTab(\'week\')">🗓️ Sem.</div>' +
        '<div class="nav-tab '+(activeTab==='epic'?'active':'')+'" onclick="switchTab(\'epic\')">🛒 Épic.</div>' +
        '<div class="nav-tab '+(activeTab==='sante'?'active':'')+'" onclick="switchTab(\'sante\')">📊 Santé</div>' +
        '<div class="nav-tab '+(activeTab==='config'?'active':'')+'" onclick="switchTab(\'config\')">⚙️ Config</div>' +
        '</div>';

      html += '<div class="content">';
      if (activeTab === 'jour') html += renderToday();
      else if (activeTab === 'week') html += renderWeek();
      else if (activeTab === 'epic') html += renderEpic();
      else if (activeTab === 'sante') html += renderSante();
      else if (activeTab === 'config') html += renderConfig();
      html += '</div>';

      document.getElementById('root').innerHTML = html;
      document.body.classList.toggle('dark', ST.dark);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(err){
        console.log('SW registration failed:', err);
      });
    }

    render();
  </script>
</body>
</html>
