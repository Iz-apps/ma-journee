<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ma Journée</title>

  <!-- PWA Manifest inline -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ma Journée" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6c63ff;
      --primary-dark: #5a52d5;
      --bg: #f4f3ff;
      --card: #ffffff;
      --text: #2d2d3a;
      --subtext: #888;
      --done-color: #c0bfff;
      --danger: #ff6b6b;
      --radius: 16px;
      --shadow: 0 4px 16px rgba(108,99,255,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* HEADER */
    header {
      background: var(--primary);
      color: white;
      padding: 52px 20px 20px;
      padding-top: calc(52px + env(safe-area-inset-top));
      text-align: center;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }

    /* DATE TABS */
    .date-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 16px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .date-tabs::-webkit-scrollbar { display: none; }
    .date-tab {
      flex-shrink: 0;
      background: var(--card);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 8px 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-size: 0.78rem;
    }
    .date-tab .day { font-weight: 700; font-size: 1rem; }
    .date-tab.active { border-color: var(--primary); background: var(--primary); color: white; }
    .date-tab:hover:not(.active) { border-color: var(--primary); }

    /* MAIN CONTENT */
    main { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* ADD TASK */
    .add-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .add-row {
      display: flex;
      gap: 8px;
    }
    .add-row input {
      flex: 1;
      border: 2px solid #e0e0f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
      background: var(--bg);
    }
    .add-row input:focus { border-color: var(--primary); }
    .add-row select {
      border: 2px solid #e0e0f0;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.85rem;
      background: var(--bg);
      outline: none;
      cursor: pointer;
    }
    .btn-add {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1.2rem;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s;
    }
    .btn-add:hover { background: var(--primary-dark); }

    /* PROGRESS */
    .progress-bar-wrap {
      background: #e0e0f0;
      border-radius: 999px;
      height: 8px;
      margin-top: 12px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--primary);
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--subtext);
    }

    /* CATEGORIES */
    .category-section { margin-bottom: 16px; }
    .category-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--subtext);
      margin-bottom: 8px;
      padding-left: 4px;
    }

    /* TASK CARD */
    .task-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity 0.3s, transform 0.2s;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .task-card.done {
      opacity: 0.6;
    }
    .task-card.done .task-text {
      text-decoration: line-through;
      color: var(--subtext);
    }
    .task-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
      font-size: 0.9rem;
    }
    .task-card.done .task-check {
      background: var(--primary);
      color: white;
    }
    .task-body { flex: 1; min-width: 0; }
    .task-text { font-size: 0.95rem; font-weight: 500; }
    .task-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      margin-top: 4px;
    }
    .task-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 8px;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .task-delete:hover { color: var(--danger); }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 32px 0;
      color: var(--subtext);
    }
    .empty .emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    /* CATEGORY COLORS */
    .cat-perso    { background: #fff0f6; color: #d63384; }
    .cat-travail  { background: #f0f4ff; color: #4263eb; }
    .cat-sante    { background: #f0fff4; color: #2f9e44; }
    .cat-courses  { background: #fff9f0; color: #e67700; }
    .cat-autre    { background: #f8f0ff; color: #7048e8; }

    /* BOTTOM NAV PLACEHOLDER */
    .bottom-space { height: 24px; }
  </style>
</head>
<body>

<header>
  <h1>✨ Ma Journée</h1>
  <p id="header-date"></p>
</header>

<div class="date-tabs" id="dateTabs"></div>

<main>
  <div class="add-section">
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Nouvelle tâche…" maxlength="120" />
      <select id="catSelect">
        <option value="autre">🔮 Autre</option>
        <option value="perso">💜 Perso</option>
        <option value="travail">💼 Travail</option>
        <option value="sante">💚 Santé</option>
        <option value="courses">🛒 Courses</option>
      </select>
      <button class="btn-add" id="addBtn">+</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-label">
      <span id="progressText">0 / 0 tâches</span>
      <span id="progressPct">0%</span>
    </div>
  </div>

  <div id="taskList"></div>
  <div class="bottom-space"></div>
</main>

<script>
  const CATS = {
    perso:   { label: '💜 Perso',   cls: 'cat-perso' },
    travail: { label: '💼 Travail', cls: 'cat-travail' },
    sante:   { label: '💚 Santé',   cls: 'cat-sante' },
    courses: { label: '🛒 Courses', cls: 'cat-courses' },
    autre:   { label: '🔮 Autre',   cls: 'cat-autre' },
  };

  // ── STATE ──────────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('mj_tasks') || '{}');
  // tasks = { 'YYYY-MM-DD': [ {id, text, cat, done} ] }

  let selectedDate = todayKey();

  function todayKey() {
    const d = new Date();
    return d.toISOString().split('T')[0];
  }
  function formatDisplay(key) {
    const d = new Date(key + 'T00:00:00');
    return d.toLocaleDateString('fr-CA', { weekday:'long', day:'numeric', month:'long' });
  }
  function formatTab(key) {
    const d = new Date(key + 'T00:00:00');
    const today = todayKey();
    const diff = (new Date(key) - new Date(today)) / 86400000;
    const dayName = diff === 0 ? "Auj." : diff === 1 ? "Dem." : diff === -1 ? "Hier" :
                    d.toLocaleDateString('fr-CA', { weekday:'short' });
    const dayNum  = d.getDate();
    return { dayName, dayNum };
  }

  // ── BUILD DATE TABS ────────────────────────────────────
  function buildTabs() {
    const container = document.getElementById('dateTabs');
    container.innerHTML = '';
    const today = todayKey();
    const dates = new Set([today]);

    // add dates that have tasks
    Object.keys(tasks).forEach(k => dates.add(k));

    // add yesterday & tomorrow
    const yd = new Date(); yd.setDate(yd.getDate() - 1);
    const tm = new Date(); tm.setDate(tm.getDate() + 1);
    dates.add(yd.toISOString().split('T')[0]);
    dates.add(tm.toISOString().split('T')[0]);

    const sorted = [...dates].sort();
    sorted.forEach(key => {
      const { dayName, dayNum } = formatTab(key);
      const tab = document.createElement('div');
      tab.className = 'date-tab' + (key === selectedDate ? ' active' : '');
      tab.innerHTML = `<div class="day">${dayNum}</div><div>${dayName}</div>`;
      tab.onclick = () => { selectedDate = key; buildTabs(); renderTasks(); updateHeader(); };
      container.appendChild(tab);
    });

    // scroll active tab into view
    const activeEl = container.querySelector('.active');
    if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  function updateHeader() {
    document.getElementById('header-date').textContent = formatDisplay(selectedDate);
  }

  // ── RENDER TASKS ───────────────────────────────────────
  function renderTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    const dayTasks = tasks[selectedDate] || [];

    if (dayTasks.length === 0) {
      list.innerHTML = `<div class="empty"><span class="emoji">☀️</span>Aucune tâche pour cette journée.</div>`;
      updateProgress(0, 0);
      return;
    }

    // group by category
    const grouped = {};
    dayTasks.forEach(t => {
      if (!grouped[t.cat]) grouped[t.cat] = [];
      grouped[t.cat].push(t);
    });

    Object.entries(grouped).forEach(([cat, items]) => {
      const sec = document.createElement('div');
      sec.className = 'category-section';
      const catInfo = CATS[cat] || CATS.autre;
      sec.innerHTML = `<div class="category-title">${catInfo.label}</div>`;
      items.forEach(task => {
        const card = document.createElement('div');
        card.className = 'task-card' + (task.done ? ' done' : '');
        card.innerHTML = `
          <div class="task-check">${task.done ? '✓' : ''}</div>
          <div class="task-body">
            <div class="task-text">${escHtml(task.text)}</div>
            <span class="task-badge ${catInfo.cls}">${catInfo.label}</span>
          </div>
          <button class="task-delete" data-id="${task.id}" title="Supprimer">✕</button>
        `;
        card.addEventListener('click', (e) => {
          if (e.target.closest('.task-delete')) return;
          toggleTask(task.id);
        });
        card.querySelector('.task-delete').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteTask(task.id);
        });
        sec.appendChild(card);
      });
      list.appendChild(sec);
    });

    const done = dayTasks.filter(t => t.done).length;
    updateProgress(done, dayTasks.length);
  }

  function updateProgress(done, total) {
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${done} / ${total} tâche${total !== 1 ? 's' : ''}`;
    document.getElementById('progressPct').textContent = pct + '%';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── ACTIONS ────────────────────────────────────────────
  function addTask() {
    const input = document.getElementById('taskInput');
    const cat   = document.getElementById('catSelect').value;
    const text  = input.value.trim();
    if (!text) { input.focus(); return; }

    if (!tasks[selectedDate]) tasks[selectedDate] = [];
    tasks[selectedDate].push({ id: Date.now().toString(), text, cat, done: false });
    save();
    input.value = '';
    input.focus();
    renderTasks();
  }

  function toggleTask(id) {
    const day = tasks[selectedDate] || [];
    const t = day.find(x => x.id === id);
    if (t) { t.done = !t.done; save(); renderTasks(); }
  }

  function deleteTask(id) {
    if (!tasks[selectedDate]) return;
    tasks[selectedDate] = tasks[selectedDate].filter(x => x.id !== id);
    save();
    renderTasks();
  }

  function save() {
    localStorage.setItem('mj_tasks', JSON.stringify(tasks));
  }

  // ── EVENTS ─────────────────────────────────────────────
  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── INIT ───────────────────────────────────────────────
  updateHeader();
  buildTabs();
  renderTasks();

  // ── SERVICE WORKER ─────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('SW enregistré :', reg.scope);
    }).catch(err => {
      console.warn('SW échec :', err);
    });
  }
</script>
</body>
</html>
