<!DOCTYPE html>
<html lang='fr'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0, viewport-fit=cover'>
  <title>Ma Journée ✨</title>
  <link rel='manifest' href='manifest.json'>
  <link rel='icon' href='icon-192.png'>
  <meta name='theme-color' content='#6c63ff'>
  <meta name='apple-mobile-web-app-capable' content='yes'>
  <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>
  <meta name='apple-mobile-web-app-title' content='Ma Journée'>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f8f9fa;
      --text: #1a1a1a;
      --sub: #666666;
      --primary: #6c63ff;
      --border: #e0e0e0;
      --radius: 16px;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --matin: #f59e0b;
      --aprem: #10b981;
      --soir: #8b5cf6;
    }
    body.dark {
      --bg: #1a1a1a;
      --card: #2a2a2a;
      --text: #ffffff;
      --sub: #aaaaaa;
      --border: #444444;
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    html { padding: max(0px, env(safe-area-inset-top)) max(0px, env(safe-area-inset-right)) max(0px, env(safe-area-inset-bottom)) max(0px, env(safe-area-inset-left)); }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .header {
      padding: 16px; background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px;
    }
    .header-title { font-size: 20px; font-weight: 600; }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .btn {
      padding: 8px 12px; border: none; border-radius: var(--radius);
      background: var(--primary); color: white; cursor: pointer;
      font-size: 14px; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-icon { padding: 8px; font-size: 16px; background: none; border: none; cursor: pointer; color: var(--text); }
    .btn-icon:hover { opacity: 0.7; }
    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      overflow-x: auto; padding: 0 8px;
    }
    .tab-btn {
      padding: 12px 16px; border: none; background: transparent; cursor: pointer;
      color: var(--sub); font-size: 14px; white-space: nowrap;
      border-bottom: 3px solid transparent; transition: all 0.2s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn:hover { color: var(--text); }
    .content {
      flex: 1; overflow-y: auto; padding: 16px;
    }
    .day-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .day-nav button { background: none; border: none; font-size: 24px; cursor: pointer; }
    .progress-bar {
      width: 100%; height: 8px; background: var(--border); border-radius: 4px;
      overflow: hidden; margin-bottom: 16px;
    }
    .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
    .section {
      margin-bottom: 20px;
    }
    .section-header {
      padding: 8px 12px; border-radius: var(--radius);
      font-weight: 600; font-size: 14px; color: white; margin-bottom: 8px;
    }
    .section-header.matin { background: var(--matin); }
    .section-header.aprem { background: var(--aprem); }
    .section-header.soir { background: var(--soir); }
    .task-card {
      background: var(--card); padding: 12px; border-radius: var(--radius);
      margin-bottom: 8px; border: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .task-card.done { opacity: 0.6; }
    .task-card.done .task-name { text-decoration: line-through; }
    .task-reorder { display: flex; flex-direction: column; gap: 4px; }
    .reorder-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 2px 4px; color: var(--sub); }
    .checkbox-circle {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border);
      background: none; cursor: pointer; transition: all 0.2s;
    }
    .checkbox-circle.checked { background: var(--primary); border-color: var(--primary); }
    .checkbox-circle:hover { border-color: var(--primary); }
    .task-content { flex: 1; }
    .task-name { font-weight: 500; }
    .task-note { font-size: 12px; color: var(--sub); margin-top: 4px; }
    .task-actions { display: flex; gap: 8px; }
    .note-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; color: var(--sub); }
    .note-btn:hover { color: var(--primary); }
    .note-area {
      background: var(--bg); padding: 8px; border-radius: 8px; border: 1px solid var(--border);
      margin-top: 8px; width: 100%;
    }
    .note-textarea {
      width: 100%; min-height: 60px; border: none; background: none; color: var(--text);
      font-family: inherit; resize: vertical;
    }
    .note-textarea::placeholder { color: var(--sub); }
    .note-buttons { display: flex; gap: 8px; margin-top: 8px; }
    .note-buttons button { padding: 6px 12px; font-size: 12px; }
    .card { background: var(--card); padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; }
    .card-title { font-weight: 600; margin-bottom: 12px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .input-row input, .input-row select {
      flex: 1; min-width: 100px; padding: 8px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px;
    }
    .med-entry {
      background: var(--bg); padding: 8px 12px; border-radius: 8px;
      margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
    }
    .med-time { background: var(--primary); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .med-pain { font-weight: 600; }
    .med-pain.pain-0, .med-pain.pain-1, .med-pain.pain-2, .med-pain.pain-3 { color: #10b981; }
    .med-pain.pain-4, .med-pain.pain-5, .med-pain.pain-6 { color: #f59e0b; }
    .med-pain.pain-7, .med-pain.pain-8, .med-pain.pain-9, .med-pain.pain-10 { color: #ef4444; }
    .day-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; }
    .day-card-header {
      padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      user-select: none;
    }
    .day-card-header:hover { background: var(--border); }
    .day-progress { font-size: 12px; color: var(--sub); }
    .day-card-content { padding: 12px; border-top: 1px solid var(--border); display: none; }
    .day-card-content.open { display: block; }
    .week-selector { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
    .week-btn { padding: 8px 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 12px; }
    .week-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .epic-tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
    .epic-tab { padding: 12px; border: none; background: transparent; cursor: pointer; color: var(--sub); border-bottom: 2px solid transparent; }
    .epic-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .epic-cat-select { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
    .epic-cat-btn { padding: 6px 12px; border: 1px solid var(--border); background: var(--card); border-radius: 8px; cursor: pointer; font-size: 12px; }
    .epic-cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .epic-item { background: var(--bg); padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .epic-item input { margin: 0; }
    .epic-item .item-name { flex: 1; }
    .epic-item .item-cat { font-size: 12px; color: var(--sub); }
    .meal-input { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .meal-icon { font-size: 16px; min-width: 20px; }
    .meal-input input { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
    .sante-sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
    .sante-sub-tab { padding: 12px; border: none; background: transparent; cursor: pointer; color: var(--sub); border-bottom: 2px solid transparent; font-size: 14px; }
    .sante-sub-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .sante-form-row { margin-bottom: 12px; }
    .sante-form-row label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 4px; font-weight: 500; }
    .sante-form-row input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; }
    .sante-cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px;
    }
    .sante-cal-cell {
      aspect-ratio: 1; padding: 4px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); text-align: center; font-size: 12px; cursor: pointer;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .sante-cal-cell:hover { background: var(--card); }
    .sante-cal-cell.today { border: 2px solid var(--primary); }
    .cal-dots { display:flex; justify-content:center; gap:2px; margin-top:1px; }
    .cal-dot  { width:6px; height:6px; border-radius:50%; display:inline-block; }
    .cal-dot.blue   { background:var(--primary); }
    .cal-dot.purple { background:#e879f9; }
    .cal-dot.red    { background:#ef4444; }
    .humeur-picker { display:flex; gap:6px; margin-top:4px; }
    .humeur-btn { font-size:22px; background:none; border:2px solid transparent; border-radius:50%; padding:4px 6px; cursor:pointer; transition:all 0.2s; }
    .humeur-btn.active { border-color:var(--primary); background:var(--card); }
    .sante-notes { width:100%; min-height:60px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font-family:inherit; padding:8px; font-size:14px; resize:vertical; }
    .sante-histo {
      width: 100%; border-collapse: collapse;
    }
    .sante-histo th, .sante-histo td { padding: 8px; text-align: left; font-size: 12px; border-bottom: 1px solid var(--border); }
    .sante-histo th { font-weight: 600; color: var(--sub); }
    .histo-val { padding: 2px 6px; border-radius: 4px; font-weight: 500; }
    .histo-val.ok { background: rgba(16,185,129,0.2); color: #10b981; }
    .histo-val.warn { background: rgba(245,158,11,0.2); color: #f59e0b; }
    .histo-val.bad { background: rgba(239,68,68,0.2); color: #ef4444; }
    .histo-val.neu { color: var(--text); }
    .config-intro { margin-bottom: 16px; line-height: 1.6; }
    .config-count { font-weight: 600; color: var(--primary); }
    .config-section { margin-bottom: 20px; }
    .config-section-title {
      font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
    }
    .config-toggle-all { padding: 6px 12px; font-size: 12px; }
    .config-task-row {
      background: var(--bg); padding: 12px; border-radius: 8px; margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .config-task-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .config-task-header input { margin: 0; }
    .config-task-name { flex: 1; font-weight: 500; }
    .config-period-picker { display: flex; gap: 4px; margin-bottom: 8px; }
    .period-btn { padding: 4px 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 4px; font-size: 11px; cursor: pointer; }
    .period-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .config-freq-picker { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
    .freq-btn { padding: 4px 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 4px; font-size: 11px; cursor: pointer; }
    .freq-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .config-day-toggles { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .day-toggle { min-width: 36px; height: 32px; border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; padding: 0 4px; transition: all 0.15s; }
    .day-toggle:hover { border-color: var(--primary); color: var(--primary); }
    .day-toggle.active { background: var(--primary); color: white; border-color: var(--primary); }
    .schedule-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--primary); background: rgba(108,99,255,0.1); border-radius: 6px; padding: 2px 8px; margin-top: 4px; flex-wrap: wrap; }
    .add-custom-task { display: flex; gap: 8px; margin-top: 12px; }
    .add-custom-task input { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
    .add-custom-task button { padding: 8px 12px; }
    .journal-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .journal-header { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; user-select: none; background: linear-gradient(135deg,#f59e0b22,#e879f922); border-radius: var(--radius) var(--radius) 0 0; }
    .journal-header:hover { opacity: 0.85; }
    .journal-body { padding: 0 16px 16px; border-top: 1px solid var(--border); display: none; }
    .journal-body.open { display: block; }
    .journal-row { margin-bottom: 12px; }
    .journal-row label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 4px; font-weight: 500; }
    .journal-row input[type=time], .journal-row textarea { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: inherit; font-size: 14px; }
    .journal-row textarea { min-height: 70px; resize: vertical; }
    .gratitude-entry { background: var(--bg); padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid #f59e0b; font-size: 13px; }
    .gratitude-entry-date { font-size: 11px; color: var(--sub); margin-bottom: 2px; }
    .med-value-form { background: var(--card); border: 2px solid var(--primary); border-radius: 12px; padding: 12px 14px; margin: 4px 0 8px 44px; }
    .med-value-form label { display: block; font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
    .med-value-form input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 16px; font-weight: 600; }
    .med-value-form input:focus { outline: 2px solid var(--primary); }
    .med-badge { display: inline-block; background: rgba(108,99,255,0.15); color: var(--primary); border-radius: 6px; padding: 1px 6px; font-size: 11px; font-weight: 600; margin-top: 2px; }
  </style>
</head>
<body>
  <div class='app'>
    <div class='header'>
      <div class='header-title'>Ma Journée ✨</div>
      <div class='header-right'>
        <button class='btn-icon' onclick='toggleDarkMode()' title='Dark mode'>🌙</button>
      </div>
    </div>
    <div class='tabs'>
      <button class='tab-btn active' onclick='switchTab("jour")'>📅 Jour</button>
      <button class='tab-btn' onclick='switchTab("sem")'>🗓️ Sem.</button>
      <button class='tab-btn' onclick='switchTab("epic")'>🛒 Épic.</button>
      <button class='tab-btn' onclick='switchTab("sante")'>📊 Santé</button>
      <button class='tab-btn' onclick='switchTab("config")'>⚙️ Config</button>
    </div>
    <div class='content' id='content'></div>
  </div>

  <script>
    const JOURS_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const JOURS_COURT = ['D','L','M','M','J','V','S'];
    const JOURS_2     = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
    const JOURS_FULL  = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const MOIS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    const CATEGORIES = {fruits:'🥦 Fruits & Légumes', viande:'🥩 Viandes', fromage:'🧀 Laitiers', epice:'🥫 Épicerie', autre:'🛍️ Autres'};
    const MEALS = {dej:'🌅 Déj.', diner:'☀️ Dîner', souper:'🌙 Souper'};

    const MED_TASKS = {
      rmed_glycemie: {field:'glycemie',   label:'Glycémie',         unit:'mmol/L', step:'0.1', ph:'ex: 5.5'},
      rmed_tension:  {type:'tension',     label:'Tension artérielle', unit:'mmHg'},
      rmed_poids:    {field:'poids',      label:'Poids',               unit:'kg',     step:'0.1', ph:'ex: 65.0'},
      rmed_sato2:    {field:'sato2',      label:'Saturation O₂',   unit:'%',      ph:'ex: 98'},
      rmed_temp:     {field:'temp',       label:'Température',      unit:'°C',    step:'0.1', ph:'ex: 37.0'},

      rmed_sommeil:  {field:'sommeil',    label:'Sommeil',              unit:'h',      step:'0.5', ph:'ex: 8'},
    };

    const DEFAULT_TASKS = {
      matin: [
        {id:'lever', emoji:'⏰', name:'Heure de lever', defPeriod:'matin'},
        {id:'eau', emoji:'💧', name:"Verre d'eau au lever", defPeriod:'matin'},
        {id:'med_m', emoji:'💊', name:'Médicaments — matin', defPeriod:'matin'},

        {id:'lit', emoji:'🛏️', name:'Faire le lit', defPeriod:'matin'},

        {id:'diner', emoji:'🥗', name:'Dîner', defPeriod:'aprem'},
        {id:'hydrat', emoji:'💧', name:'Hydratation', defPeriod:'aprem'},
        {id:'muscu', emoji:'💪', name:'Musculation', defPeriod:'aprem'},

        {id:'lecture', emoji:'📚', name:'Lecture', defPeriod:'aprem'},

        {id:'souper', emoji:'🍽️', name:'Souper', defPeriod:'soir'},

      ],
      routine: [
        {id:'epicerie', emoji:'🛒', name:'Épicerie', freq:'Hebdo', defPeriod:'aprem'},
        {id:'menage', emoji:'🧹', name:'Grand ménage', freq:'Hebdo', defPeriod:'matin'},
        {id:'lavage', emoji:'👕', name:'Lavage', freq:'Hebdo', defPeriod:'matin'},

      menage: [
        {id:'men_lavage1',  emoji:'🦺', name:'Lavage — 1re brassée',     defPeriod:'matin'},

        {id:'men_seche',    emoji:'💨', name:'Sécheuse / Transfer',        defPeriod:'aprem'},

        {id:'men_aspir',    emoji:'🧹', name:'Aspiration / Balayage',       defPeriod:'aprem'},
        {id:'men_vaisselle',emoji:'🪣', name:'Vaisselle générale',          defPeriod:'aprem'},
        {id:'men_sdb',      emoji:'🚿', name:'Nettoyage salle de bain',     defPeriod:'aprem'},
        {id:'men_cuisine',  emoji:'🧼', name:'Nettoyage cuisine',           defPeriod:'aprem'},
        {id:'men_planchers',emoji:'🪥', name:'Lavage des planchers',        defPeriod:'aprem'},
        {id:'men_poubelle', emoji:'🗑️', name:'Sortir les poubelles',        defPeriod:'matin'},

    };

    function loadSt() { return JSON.parse(localStorage.getItem('mj_v4') || '{}'); }
    function saveSt() { localStorage.setItem('mj_v4', JSON.stringify(ST)); }
    var ST = loadSt();
    if (!ST.activeTasks)  ST.activeTasks  = {};
    if (!ST.completions)  ST.completions  = {};
    if (!ST.notes)        ST.notes        = {};
    if (!ST.medLogs)      ST.medLogs      = {};
    if (!ST.sante)        ST.sante        = {};
    if (!ST.menus)        ST.menus        = {};
    if (!ST.epicItems)    ST.epicItems    = [];
    if (!ST.customTasks)  ST.customTasks  = {matin:[],aprem:[],soir:[]};
    if (!ST.taskFreq)     ST.taskFreq     = {};
    if (!ST.taskOrder)    ST.taskOrder    = {};
    if (!ST.journal)      ST.journal      = {};
    if (!ST.medValueOpen) ST.medValueOpen = {};
    function todayKey() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
    function keyFromDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
    function dateFromKey(k) { const [y,m,d] = k.split('-'); return new Date(y,m-1,d); }
    function shiftDay(key, n) { const d = dateFromKey(key); d.setDate(d.getDate()+n); return keyFromDate(d); }
    function formatLong(k) { const d = dateFromKey(k); return JOURS_FR[d.getDay()] + ' ' + d.getDate() + ' ' + MOIS_FR[d.getMonth()]; }
    function formatShort(k) { const d = dateFromKey(k); return d.getDate() + '/' + String(d.getMonth()+1).padStart(2,'0'); }
    function mondayOfWeek(dateKey) { const d = dateFromKey(dateKey); const first = new Date(d.getFullYear(), d.getMonth(), d.getDate()); const day = first.getDay(); const diff = first.getDate() - day + (day === 0 ? -6 : 1); return keyFromDate(new Date(d.getFullYear(), d.getMonth(), diff)); }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function taskMatchesDay(taskId, dateKey) {
      if (!ST.activeTasks[taskId]) return false;
      const freq = ST.taskFreq[taskId] || 'Quotidien';
      if (freq === 'Quotidien') return true;
      const d = dateFromKey(dateKey);
      const dow = d.getDay();
      if (freq === 'Sem.') return dow >= 1 && dow <= 5;
      if (freq === 'W-E') return dow === 0 || dow === 6;
      if (freq === 'Perso') return !!(ST.taskFreq[taskId+'_days'] && ST.taskFreq[taskId+'_days'][dow]);
      return true;
    }

    function getActiveByPeriod() {
      const active = {matin:[], aprem:[], soir:[]};
      for (const cat of ['matin','aprem','soir','routine','menage','animaux','medical']) {
        const tasks = DEFAULT_TASKS[cat];
        for (const t of tasks) {
          if (ST.activeTasks[t.id]) {
            const p = ST.activeTasks[t.id];
            if (!active[p]) active[p] = [];
            active[p].push(t);
          }
        }
      }
      for (const t of (ST.customTasks.matin || [])) { if (!active.matin) active.matin=[]; active.matin.push(t); }
      for (const t of (ST.customTasks.aprem || [])) { if (!active.aprem) active.aprem=[]; active.aprem.push(t); }
      for (const t of (ST.customTasks.soir || [])) { if (!active.soir) active.soir=[]; active.soir.push(t); }
      for (const p of ['matin','aprem','soir']) {
        active[p].sort((a,b) => (ST.taskOrder[a.id] || 999) - (ST.taskOrder[b.id] || 999));
      }
      return active;
    }

    function renderToday() {
      const today = ST.activeDay;
      const active = getActiveByPeriod();
      const comp = ST.completions[today] || {};
      const allTasks = [].concat(active.matin, active.aprem, active.soir)
        .filter(t => taskMatchesDay(t.id, today));
      const total = allTasks.length;
      const done = allTasks.filter(t => comp[t.id]).length;
      const pct = total ? Math.round(100*done/total) : 0;

      let html = '<div class="day-nav"><button onclick="shiftActiveDay(-1)">←</button><div>' + esc(formatLong(today)) + '</div><button onclick="shiftActiveDay(1)">→</button></div>';
      html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div><div style="text-align:center;font-size:12px;color:var(--sub);margin-bottom:16px;">' + done + '/' + total + ' (' + pct + '%)</div>';

      for (const period of ['matin','aprem','soir']) {
        const tasks = active[period].filter(t => taskMatchesDay(t.id, today));
        if (!tasks.length) continue;
        html += '<div class="section"><div class="section-header ' + period + '">' + (period==='matin'?'🌅 Matin':period==='aprem'?'☀️ Après-midi':'🌙 Soir') + '</div>';
        for (const t of tasks) {
          const isDone = comp[t.id];
          const note = (ST.notes[today]||{})[t.id];
          const showNote = ST.activeTasks[t.id+'_noteOpen'];
          const medDef = MED_TASKS[t.id];
          const showMedForm = medDef && ST.medValueOpen && ST.medValueOpen[t.id];
          const santeDay = (ST.sante && ST.sante[today]) || {};
          let medBadge = '';
          if (medDef) {
            if (medDef.type === 'tension' && santeDay.tension_s && santeDay.tension_d) {
              medBadge = santeDay.tension_s + '/' + santeDay.tension_d + ' mmHg';
            } else if (medDef.field && santeDay[medDef.field] !== undefined && santeDay[medDef.field] !== '') {
              medBadge = santeDay[medDef.field] + ' ' + (medDef.unit||'');
            } else if (t.id === 'rmed_humeur' && santeDay.humeur) {
              const HUM = ['😞','😕','😐','🙂','😄'];
              medBadge = HUM[santeDay.humeur-1];
            }
          }
          html += '<div class="task-card' + (isDone?' done':'') + '"><div class="task-reorder"><button class="reorder-btn" onclick="moveTask(\'' + period + '\',\'' + esc(t.id) + '\',-1)">▲</button><button class="reorder-btn" onclick="moveTask(\'' + period + '\',\'' + esc(t.id) + '\',' + 1 + ')">▼</button></div>';
          html += '<button class="checkbox-circle' + (isDone?' checked':'') + '" onclick="toggleComp(\'' + esc(t.id) + '\')"></button>';
          html += '<div class="task-content"><div class="task-name">' + t.emoji + ' ' + esc(t.name) + '</div>';
          if (medBadge) html += '<div><span class="med-badge">📊 ' + esc(medBadge) + '</span></div>';
          if (note) html += '<div class="task-note">📝 ' + esc(note.substring(0,50)) + (note.length>50?'...':'') + '</div>';
          html += '</div>';
          if (medDef) html += '<button class="note-btn" title="Saisir mesure" onclick="toggleMedValueForm(\'' + esc(t.id) + '\')">📊</button>';
          html += '<button class="note-btn" onclick="toggleNote(\'' + esc(t.id) + '\')">📝</button>';
          html += '</div>';
          if (showMedForm) {
            const mval_s = santeDay.tension_s || '';
            const mval_d = santeDay.tension_d || '';
            const mval   = (medDef.field ? santeDay[medDef.field] : '') || '';
            if (medDef.type === 'tension') {
              html += '<div class="med-value-form"><label>' + medDef.label + ' (mmHg)</label>';
              html += '<div style="display:flex;gap:8px;align-items:center;">';
              html += '<input type="number" id="medval_s_' + esc(t.id) + '" placeholder="Sys. ex:120" value="' + esc(mval_s) + '">';
              html += '<span style="font-size:20px;padding:0 4px;">/</span>';
              html += '<input type="number" id="medval_d_' + esc(t.id) + '" placeholder="Dia. ex:80" value="' + esc(mval_d) + '">';
              html += '</div>';
            } else if (t.id === 'rmed_humeur') {
              const HUM = ['😞','😕','😐','🙂','😄'];
              html += '<div class="med-value-form"><label>Humeur du jour</label><div class="humeur-picker">';
              for (var hh=1; hh<=5; hh++) {
                html += '<button class="humeur-btn' + (santeDay.humeur==hh?' active':'') + '" onclick="saveMedValue(\'' + esc(t.id) + '\',\'' + today + '\',' + hh + ')">' + HUM[hh-1] + '</button>';
              }
              html += '</div>';
            } else {
              html += '<div class="med-value-form"><label>' + medDef.label + (medDef.unit ? ' (' + medDef.unit + ')' : '') + '</label>';
              html += '<input type="number"' + (medDef.step?' step="'+medDef.step+'"':'') + (medDef.max?' max="'+medDef.max+'"':'') + ' id="medval_' + esc(t.id) + '" placeholder="' + (medDef.ph||'') + '" value="' + esc(mval) + '">';
            }
            if (t.id !== 'rmed_humeur') {
              html += '<div style="display:flex;gap:8px;margin-top:8px;">';
              html += '<button class="btn" onclick="saveMedValue(\'' + esc(t.id) + '\',\'' + today + '\')">✅ Enregistrer</button>';
              html += '<button class="btn secondary" onclick="toggleMedValueForm(\'' + esc(t.id) + '\')">Annuler</button>';
              html += '</div>';
            }
            html += '</div>';
          }
          if (showNote) {
            html += '<div class="task-card" style="margin-left:40px;padding:0;border:none;background:none;"><div style="width:100%"><div class="note-area"><textarea class="note-textarea" id="note_' + esc(t.id) + '" placeholder="Ajouter une note...">' + esc(note||'') + '</textarea></div><div class="note-buttons"><button class="btn" onclick="saveNote(\'' + esc(t.id) + '\')">Enregistrer</button><button class="btn secondary" onclick="toggleNote(\'' + esc(t.id) + '\')">Annuler</button><button class="btn secondary" onclick="deleteNote(\'' + esc(t.id) + '\')">Supprimer</button></div></div></div>';
          }
        }
        html += '</div>';
      }

      html += '<div class="section"><div class="section-header" style="background:#e879f9;">💊 Médicaments</div>';
      html += '<button class="btn" style="width:100%;margin-bottom:12px;" onclick="toggleMedForm()">+ Ajouter médicament</button>';
      if (ST.medFormOpen) {
        html += '<div class="card"><div class="input-row"><input type="time" id="med_time" placeholder="Heure"><input type="text" id="med_name" placeholder="Médicament"></div>';
        html += '<div class="input-row"><input type="number" id="med_dose" placeholder="Dose" style="flex:1;"><select id="med_pain" onchange="setPain(this.value)" style="flex:1;"><option value="">Douleur (0-10)</option>';
        for (let i=0; i<=10; i++) html += '<option value="' + i + '">' + i + '</option>';
        html += '</select></div><button class="btn" style="width:100%" onclick="addMedEntry()">Ajouter</button></div>';
      }
      const medLogs = ST.medLogs[today] || [];
      for (const m of medLogs) {
        const painClass = m.pain <= 3 ? 'pain-0' : m.pain <= 6 ? 'pain-4' : 'pain-7';
        html += '<div class="med-entry"><div><span class="med-time">' + esc(m.time) + '</span> <strong>' + esc(m.name) + '</strong> ' + esc(m.dose) + '</div><div><span class="med-pain ' + painClass + '">' + m.pain + '/10</span> <button class="btn-icon" onclick="delMedEntry(\'' + esc(m.id) + '\')">✕</button></div></div>';
      }
      html += '</div>';

      html += renderJournalSection(today);

      document.getElementById('content').innerHTML = html;
    }

    function renderJournalSection(dateKey) {
      var j = (ST.journal || {})[dateKey] || {};
      var open = ST.journalOpen ? ' open' : '';

      var gratHisto = '';
      if (ST.showGratHisto) {
        var gratKeys = Object.keys(ST.journal || {})
          .filter(function(k){ return k !== dateKey && ST.journal[k].gratitude; })
          .sort().reverse().slice(0, 10);
        if (gratKeys.length > 0) {
          gratHisto = '<div style="margin-top:8px;">';
          for (var gi=0; gi<gratKeys.length; gi++) {
            var gk = gratKeys[gi];
            gratHisto += '<div class="gratitude-entry"><div class="gratitude-entry-date">' + esc(formatLong(gk)) + '</div>' + esc(ST.journal[gk].gratitude) + '</div>';
          }
          gratHisto += '</div>';
        } else {
          gratHisto = '<div style="color:var(--sub);font-size:13px;padding:8px 0;">Aucune gratitude enregistrée pour les jours précédents.</div>';
        }
      }

      var html = '<div class="journal-card">';
      html += '<div class="journal-header" onclick="toggleJournal()">';
      html += '<span>📓 Journal du jour</span><span>' + (ST.journalOpen ? '▲' : '▼') + '</span></div>';
      html += '<div class="journal-body' + open + '">';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">';
      html += '<div class="journal-row"><label>⏰ Heure de lever</label><input type="time" value="' + esc(j.lever||'') + '" onchange="saveJournal(\'' + esc(dateKey) + '\',\'lever\',this.value)" onblur="saveJournal(\'' + esc(dateKey) + '\',\'lever\',this.value)"></div>';
      html += '<div class="journal-row"><label>🌙 Heure de coucher</label><input type="time" value="' + esc(j.coucher||'') + '" onchange="saveJournal(\'' + esc(dateKey) + '\',\'coucher\',this.value)" onblur="saveJournal(\'' + esc(dateKey) + '\',\'coucher\',this.value)"></div>';
      html += '</div>';
      html += '<div class="journal-row"><label>📚 Devoirs / Études</label><textarea placeholder="Notes de cours, devoirs, lectures..." onchange="saveJournal(\'' + esc(dateKey) + '\',\'devoirs\',this.value)" onblur="saveJournal(\'' + esc(dateKey) + '\',\'devoirs\',this.value)">' + esc(j.devoirs||'') + '</textarea></div>';
      html += '<div class="journal-row"><label>💼 Travail</label><textarea placeholder="Tâches, réunions, notes de travail..." onchange="saveJournal(\'' + esc(dateKey) + '\',\'travail\',this.value)" onblur="saveJournal(\'' + esc(dateKey) + '\',\'travail\',this.value)">' + esc(j.travail||'') + '</textarea></div>';
      html += '<div class="journal-row"><label style="color:#f59e0b;">🙏 Gratitude du jour</label><textarea placeholder="Je suis reconnaissant(e) pour..." onchange="saveJournal(\'' + esc(dateKey) + '\',\'gratitude\',this.value)" onblur="saveJournal(\'' + esc(dateKey) + '\',\'gratitude\',this.value)">' + esc(j.gratitude||'') + '</textarea></div>';
      html += '<button class="btn secondary" style="width:100%;font-size:12px;" onclick="toggleGratHisto()">' + (ST.showGratHisto ? '▲ Masquer' : '📅 Gratitudes précédentes') + '</button>';
      if (gratHisto) html += gratHisto;
      html += '</div></div>';
      return html;
    }

    function saveJournal(dateKey, field, val) {
      if (!ST.journal) ST.journal = {};
      if (!ST.journal[dateKey]) ST.journal[dateKey] = {};
      if (val === '' || val === null) {
        delete ST.journal[dateKey][field];
      } else {
        ST.journal[dateKey][field] = val;
      }
      saveSt();
    }

    function toggleJournal() {
      ST.journalOpen = !ST.journalOpen;
      saveSt();
      renderToday();
    }

    function toggleGratHisto() {
      ST.showGratHisto = !ST.showGratHisto;
      saveSt();
      renderToday();
    }

    function renderWeek() {
      const week = ST.weekOffset || 0;
      const today = ST.activeDay;
      const firstDay = mondayOfWeek(today);
      let startKey = firstDay;
      for (let i=0; i<7*week; i++) startKey = shiftDay(startKey, 1);

      const dayCount = ST.weekDays || 7;
      const opts = [3,7,14,30];
      let html = '<div class="week-selector">';
      for (const opt of opts) {
        html += '<button class="week-btn' + (dayCount===opt?' active':'') + '" onclick="setWeekDays(' + opt + ')">' + opt + 'j</button>';
      }
      html += '</div><div class="day-nav"><button onclick="navWeek(-1)">←</button><div>' + esc(formatShort(startKey)) + ' — ' + esc(formatShort(shiftDay(startKey, dayCount-1))) + '</div><button onclick="navWeek(1)">→</button></div>';

      const active = getActiveByPeriod();
      for (let i=0; i<dayCount; i++) {
        const key = shiftDay(startKey, i);
        const isToday = key === today;
        const comp = ST.completions[key] || {};
        const tasks = [].concat(active.matin, active.aprem, active.soir).filter(t => taskMatchesDay(t.id, key));
        const done = tasks.filter(t => comp[t.id]).length;
        const pct = tasks.length ? Math.round(100*done/tasks.length) : 0;
        const hasNotes = [].concat(active.matin, active.aprem, active.soir).some(t => (ST.notes[key]||{})[t.id]);

        html += '<div class="day-card"><div class="day-card-header' + (isToday?' open':'') + '" onclick="toggleDayCard(this)"><div><strong>' + esc(formatLong(key)) + '</strong>' + (hasNotes?' 📝':'') + '</div><div class="day-progress">' + done + '/' + tasks.length + ' — ' + pct + '%</div></div>';
        html += '<div class="day-card-content' + (isToday?' open':'') + '">';
        for (const period of ['matin','aprem','soir']) {
          const periodTasks = active[period].filter(t => taskMatchesDay(t.id, key));
          if (!periodTasks.length) continue;
          html += '<div style="margin-bottom:12px;"><div class="section-header ' + period + '" style="margin-bottom:8px;">' + (period==='matin'?'🌅 Matin':period==='aprem'?'☀️ Après-midi':'🌙 Soir') + '</div>';
          for (const t of periodTasks) {
            const isDone = comp[t.id];
            const note = (ST.notes[key]||{})[t.id];
            html += '<div style="background:var(--bg);padding:8px;border-radius:8px;margin-bottom:4px;display:flex;align-items:center;gap:8px;"><input type="checkbox"' + (isDone?' checked':'') + ' onchange="toggleComp(\'' + esc(t.id) + '\',\'' + esc(key) + '\')">';
            html += '<span>' + t.emoji + ' ' + esc(t.name) + '</span>';
            if (note) html += ' <span style="font-size:12px;color:var(--sub);">📝</span>';
            html += '</div>';
          }
          html += '</div>';
        }
        html += '</div></div>';
      }

      document.getElementById('content').innerHTML = html;
    }

    function renderEpic() {
      const mode = ST.epicMode || 'liste';
      let html = '<div class="epic-tabs"><button class="epic-tab' + (mode==='liste'?' active':'') + '" onclick="setEpicMode(\'liste\')">🛒 Liste d\'épicerie</button><button class="epic-tab' + (mode==='menu'?' active':'') + '" onclick="setEpicMode(\'menu\')">🍽️ Menu semaine</button></div>';

      if (mode === 'liste') {
        html += '<div style="margin-bottom:12px;"><div style="display:flex;gap:8px;flex-wrap:wrap;"><input type="text" id="epic_item" placeholder="Ajouter un article..."><select id="epic_cat" style="flex:1;"><option value="fruits">🥦 Fruits & Légumes</option><option value="viande">🥩 Viandes</option><option value="fromage">🧀 Laitiers</option><option value="epice">🥫 Épicerie</option><option value="autre">🛍️ Autres</option></select><button class="btn" onclick="epicAdd()">+</button></div></div>';
        html += '<div class="epic-cat-select">';
        const cats = Object.keys(CATEGORIES);
        for (const cat of cats) {
          html += '<button class="epic-cat-btn' + (ST.epicCat===cat?' active':'') + '" onclick="setEpicCat(\'' + cat + '\')">' + CATEGORIES[cat] + '</button>';
        }
        html += '</div>';

        const filtered = (ST.epicItems || []).filter(it => !ST.epicCat || it.cat === ST.epicCat);
        for (const item of filtered) {
          html += '<div class="epic-item"><input type="checkbox"' + (item.checked?' checked':'') + ' onchange="epicToggle(\'' + esc(item.id) + '\')"><span class="item-name">' + esc(item.name) + '</span><span class="item-cat">' + CATEGORIES[item.cat] + '</span><button class="btn-icon" onclick="epicDel(\'' + esc(item.id) + '\')">✕</button></div>';
        }
        if (filtered.length > 0) html += '<button class="btn" style="width:100%;margin-top:12px;" onclick="epicClearChecked()">Effacer les cochés</button>';
      } else {
        const week = ST.menuWeekOffset || 0;
        const today = ST.activeDay;
        const firstDay = mondayOfWeek(today);
        let startKey = firstDay;
        for (let i=0; i<7*week; i++) startKey = shiftDay(startKey, 1);
        html += '<div class="day-nav"><button onclick="menuNavWeek(-1)">←</button><div>' + esc(formatShort(startKey)) + ' — ' + esc(formatShort(shiftDay(startKey, 6))) + '</div><button onclick="menuNavWeek(1)">→</button></div>';

        for (let i=0; i<7; i++) {
          const key = shiftDay(startKey, i);
          const d = dateFromKey(key);
          const dow = d.getDay();
          const dayName = JOURS_FR[dow];
          html += '<div class="card"><div class="card-title">' + dayName + ' ' + d.getDate() + '</div>';
          const meals = ST.menus[key] || {dej:'',diner:'',souper:''};

            html += '<div class="meal-input"><span class="meal-icon">' + mealLabel.substring(0,1) + '</span><input type="text" placeholder="' + mealLabel + '" value="' + esc(meals[mealKey]||'') + '" onchange="saveMenu(\'' + esc(key) + '\',\'' + mealKey + '\',this.value)" onblur="saveMenu(\'' + esc(key) + '\',\'' + mealKey + '\',this.value)"></div>';
          }
          html += '</div>';
        }
      }

      document.getElementById('content').innerHTML = html;
    }

     function renderSanteCal() {

       const firstDay = d.getDay();
       const daysInMonth = new Date(year, parseInt(month), 0).getDate();
       const today = todayKey();

       let html = '<div class="day-nav"><button onclick="santeCalNav(-1)">←</button><div>' + MOIS_FR[d.getMonth()] + ' ' + year + '</div><button onclick="santeCalNav(1)">→</button></div>';

       html += '<div style="margin-bottom:16px;"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;">';
       for (let i=0; i<7; i++) {
         html += '<div style="text-align:center;font-size:11px;font-weight:600;color:var(--sub);">' + JOURS_COURT[i] + '</div>';
       }
       html += '</div><div class="sante-cal-grid">';

       for (let i=0; i<firstDay; i++) html += '<div></div>';
       for (let day=1; day<=daysInMonth; day++) {
         const key = year + '-' + String(parseInt(month)).padStart(2,'0') + '-' + String(day).padStart(2,'0');
         const sd = ST.sante[key] || {};
         const hasMes = sd.poids || sd.tension_s || sd.glycemie || sd.sato2 || sd.temp || sd.sommeil || (sd.douleur!==undefined&&sd.douleur!=='');
         const hasMeds = (ST.medLogs[key] || []).length > 0;
         const highPain = (ST.medLogs[key] || []).some(function(m){return m.pain>=7;}) || (sd.douleur && parseFloat(sd.douleur)>=7);
         const isToday = key === today;
         html += '<div class="sante-cal-cell' + (isToday?' today':'') + '" onclick="santeCalSelect(\'' + esc(key) + '\'">';
         html += '<span>' + day + '</span>';
         html += '<div class="cal-dots">';
         if (hasMes)   html += '<span class="cal-dot blue"></span>';
         if (hasMeds)  html += '<span class="cal-dot purple"></span>';
         if (highPain) html += '<span class="cal-dot red"></span>';
         html += '</div></div>';

       html += '</div></div>';

       html += '<div style="font-size:11px;color:var(--sub);display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;">';
       html += '<span><span class="cal-dot blue" style="display:inline-block;"></span> Mesures</span>';
       html += '<span><span class="cal-dot purple" style="display:inline-block;"></span> Médicaments</span>';
       html += '<span><span class="cal-dot red" style="display:inline-block;"></span> Douleur élevée</span>';
       html += '<span style="border:2px solid var(--primary);padding:0 4px;border-radius:4px;">Aujourd’hui</span></div>';

       return html;

     function renderSanteHisto() {
       const HUMEURS = ['😞','😕','😐','🙂','😄'];
       const allDates = new Set();
       Object.keys(ST.sante || {}).forEach(function(k){ allDates.add(k); });
       Object.keys(ST.medLogs || {}).forEach(function(k){ if ((ST.medLogs[k]||[]).length>0) allDates.add(k); });
       const entries = Array.from(allDates).sort().reverse().slice(0,60);

       let html = '<div style="overflow-x:auto;"><table class="sante-histo"><tr><th>Date</th><th>⚖ Poids</th><th>💉 Tension</th><th>🩸 Glyc.</th><th>🫀 O₂</th><th>❤️ FC</th><th>🤕 Douleur</th><th>💤 Sommeil</th><th>😊 Humeur</th><th>💊 Méds</th></tr>';

       for (var ei=0; ei<entries.length; ei++) {
         const key = entries[ei];
         const data = ST.sante[key] || {};
         const meds = ST.medLogs[key] || [];
         html += '<tr><td style="white-space:nowrap;">' + esc(formatShort(key)) + '</td>';

         html += '<td>' + (data.poids ? '<span class="histo-val neu">' + data.poids + 'kg</span>' : '<span style="color:var(--sub)">-</span>') + '</td>';

         if (data.tension_s && data.tension_d) {
           const s = parseFloat(data.tension_s), dd = parseFloat(data.tension_d);
           const tc = (s>=180||dd>=120)?'bad':(s>=140||dd>=90)?'warn':'ok';
           html += '<td><span class="histo-val ' + tc + '">' + data.tension_s + '/' + data.tension_d + '</span></td>';
         } else html += '<td><span style="color:var(--sub)">-</span></td>';

         if (data.glycemie) {
           const g = parseFloat(data.glycemie);
           const gc = g>10?'bad':g>7?'warn':'ok';
           html += '<td><span class="histo-val ' + gc + '">' + data.glycemie + '</span></td>';
         } else html += '<td><span style="color:var(--sub)">-</span></td>';

         if (data.sato2) {
           const o = parseFloat(data.sato2);
           const oc = o<90?'bad':o<95?'warn':'ok';
           html += '<td><span class="histo-val ' + oc + '">' + data.sato2 + '%</span></td>';
         } else html += '<td><span style="color:var(--sub)">-</span></td>';

         if (data.fc) {
           const fc = parseFloat(data.fc);
           const fcc = fc>100?'warn':fc<50?'warn':'ok';
           html += '<td><span class="histo-val ' + fcc + '">' + data.fc + '</span></td>';
         } else html += '<td><span style="color:var(--sub)">-</span></td>';

         if (data.douleur!==undefined && data.douleur!=='') {
           const dv = parseFloat(data.douleur);
           const dc = dv>=7?'bad':dv>=4?'warn':'ok';
           html += '<td><span class="histo-val ' + dc + '">' + dv + '/10</span></td>';
         } else html += '<td><span style="color:var(--sub)">-</span></td>';

         html += '<td>' + (data.sommeil ? '<span class="histo-val neu">' + data.sommeil + 'h</span>' : '<span style="color:var(--sub)">-</span>') + '</td>';
         html += '<td style="font-size:16px;">' + (data.humeur ? HUMEURS[data.humeur-1] : '<span style="color:var(--sub)">-</span>') + '</td>';

         if (meds.length > 0) {
           const maxPain = Math.max.apply(null, meds.map(function(m){return m.pain||0;}));
           const mc = maxPain>=7?'bad':maxPain>=4?'warn':'ok';
           html += '<td><span class="histo-val ' + mc + '">💊' + meds.length + '</span></td>';
         } else html += '<td><span style="color:var(--sub)">-</span></td>';

         html += '</tr>';
       }

       html += '</table></div>';
       html += '<div style="font-size:12px;color:var(--sub);margin-top:16px;display:flex;gap:16px;flex-wrap:wrap;">';
       html += '<span><span class="histo-val ok">Vert</span> = Normal</span>';
       html += '<span><span class="histo-val warn">Orange</span> = Attention</span>';
       html += '<span><span class="histo-val bad">Rouge</span> = Élevé</span></div>';

       return html;
     }

    function saveSante(dateKey, field, val) {
      if (!ST.sante) ST.sante = {};
      if (!ST.sante[dateKey]) ST.sante[dateKey] = {};
      if (val === '' || val === null) {
        delete ST.sante[dateKey][field];
      } else {
        ST.sante[dateKey][field] = val;
      }
      saveSt();
    }

    function saveSanteHumeur(dateKey, val) {
      if (!ST.sante) ST.sante = {};
      if (!ST.sante[dateKey]) ST.sante[dateKey] = {};
      ST.sante[dateKey].humeur = val;
      saveSt();
      renderSante();
    }

    function shiftSanteDate(dir) {
      const today = todayKey();
      const curr = ST.santeDate || today;
      const shifted = shiftDay(curr, dir);
      if (dir > 0 && shifted > today) return;
      ST.santeDate = shifted;
      saveSt();
      renderSante();
    }

    function santeCalNav(dir) {
      const monthKey = ST.santeMonth || todayKey().substring(0,7);
      const [year, month] = monthKey.split('-');
      let m = parseInt(month) + dir;
      let y = parseInt(year);
      if (m > 12) { m = 1; y++; }
      if (m < 1) { m = 12; y--; }
      ST.santeMonth = y + '-' + String(m).padStart(2,'0');
      saveSt();
      renderSante();
    }

    function santeCalSelect(key) {
      ST.santeDate = key;
      ST.santeView = 'form';
      saveSt();
      renderSante();
    }

    function setSanteView(view) {
      ST.santeView = view;
      if (view === 'cal') {
        ST.santeMonth = ST.santeMonth || todayKey().substring(0,7);
      }
      saveSt();
      renderSante();
    }

    function moveTask(period, taskId, dir) {
      const active = getActiveByPeriod();
      const tasks = active[period];
      const idx = tasks.findIndex(t => t.id === taskId);
      if (idx < 0) return;
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= tasks.length) return;
      const tmp = tasks[idx];
      tasks[idx] = tasks[newIdx];
      tasks[newIdx] = tmp;
      for (let i=0; i<tasks.length; i++) {
        ST.taskOrder[tasks[i].id] = i;
      }
      saveSt();
      renderToday();
    }

    function toggleComp(taskId, dateKey) {
      dateKey = dateKey || ST.activeDay;
      if (!ST.completions[dateKey]) ST.completions[dateKey] = {};
      ST.completions[dateKey][taskId] = !ST.completions[dateKey][taskId];
      saveSt();
      if (dateKey === ST.activeDay) renderToday();
      else renderWeek();
    }

    function toggleNote(taskId) {
      const key = ST.activeDay + '_note_' + taskId;
      ST.activeTasks[taskId + '_noteOpen'] = !ST.activeTasks[taskId + '_noteOpen'];
      saveSt();
      renderToday();
    }

    function saveNote(taskId) {
      const val = document.getElementById('note_' + taskId).value;
      if (!ST.notes[ST.activeDay]) ST.notes[ST.activeDay] = {};
      ST.notes[ST.activeDay][taskId] = val;
      saveSt();
      ST.activeTasks[taskId + '_noteOpen'] = false;
      renderToday();
    }

    function deleteNote(taskId) {
      if (!ST.notes[ST.activeDay]) ST.notes[ST.activeDay] = {};
      delete ST.notes[ST.activeDay][taskId];
      saveSt();
      ST.activeTasks[taskId + '_noteOpen'] = false;
      renderToday();
    }

    function toggleMedValueForm(taskId) {
      if (!ST.medValueOpen) ST.medValueOpen = {};
      ST.medValueOpen[taskId] = !ST.medValueOpen[taskId];
      saveSt();
      renderToday();
    }

    function saveMedValue(taskId, dateKey, humeurVal) {
      if (!ST.sante) ST.sante = {};
      if (!ST.sante[dateKey]) ST.sante[dateKey] = {};
      const def = MED_TASKS[taskId];
      if (!def) return;
      if (humeurVal !== undefined) {
        ST.sante[dateKey].humeur = humeurVal;
      } else if (def.type === 'tension') {
        const s = document.getElementById('medval_s_' + taskId);
        const d = document.getElementById('medval_d_' + taskId);
        if (s && s.value) ST.sante[dateKey].tension_s = s.value;
        if (d && d.value) ST.sante[dateKey].tension_d = d.value;
      } else {
        const inp = document.getElementById('medval_' + taskId);
        if (inp && inp.value !== '') ST.sante[dateKey][def.field] = inp.value;
      }
      if (!ST.completions[dateKey]) ST.completions[dateKey] = {};
      ST.completions[dateKey][taskId] = true;
      if (!ST.medValueOpen) ST.medValueOpen = {};
      ST.medValueOpen[taskId] = false;
      saveSt();
      renderToday();
    }

    function toggleTask(id, defaultPeriod) {
      if (ST.activeTasks[id]) {
        delete ST.activeTasks[id];
      } else {
        ST.activeTasks[id] = defaultPeriod;
      }
      saveSt();
      renderConfig();
    }

    function setPeriod(e, taskId, period) {
      e.preventDefault();
      ST.activeTasks[taskId] = period;
      saveSt();
      renderConfig();
    }

    function setFreq(taskId, type) {
      ST.taskFreq[taskId] = type;
      if (type !== 'Perso') {
        delete ST.taskFreq[taskId + '_days'];
      }
      saveSt();
      renderConfig();
    }

    function toggleFreqDay(taskId, dow) {
      if (!ST.taskFreq[taskId + '_days']) ST.taskFreq[taskId + '_days'] = {};
      ST.taskFreq[taskId + '_days'][dow] = !ST.taskFreq[taskId + '_days'][dow];
      saveSt();
      renderConfig();
    }

    function bulkToggle(section, val) {
      const tasks = DEFAULT_TASKS[section];
      for (const t of tasks) {
        if (val) {
          ST.activeTasks[t.id] = t.defPeriod;
        } else {
          delete ST.activeTasks[t.id];
        }
      }
      saveSt();
      renderConfig();
    }

    function addCustomTask(section) {
      const inp = document.getElementById('custom_' + section);
      const name = inp.value.trim();
      if (!name) return;
      const id = 'custom_' + Date.now();
      if (!ST.customTasks[section]) ST.customTasks[section] = [];
      ST.customTasks[section].push({id, name, emoji:'✓'});
      inp.value = '';
      saveSt();
      renderConfig();
    }

    function toggleMedForm() {
      ST.medFormOpen = !ST.medFormOpen;
      saveSt();
      renderToday();
    }

    function setPain(val) {
      ST.medPainSel = parseInt(val);
      saveSt();
    }

    function addMedEntry() {
      const time = document.getElementById('med_time').value;
      const name = document.getElementById('med_name').value;
      const dose = document.getElementById('med_dose').value;
      const pain = parseInt(document.getElementById('med_pain').value) || 0;
      if (!time || !name) return;
      if (!ST.medLogs[ST.activeDay]) ST.medLogs[ST.activeDay] = [];
      const id = 'med_' + Date.now();
      ST.medLogs[ST.activeDay].push({id, time, name, dose, pain});
      ST.medFormOpen = false;
      saveSt();
      renderToday();
    }

    function delMedEntry(id) {
      const logs = ST.medLogs[ST.activeDay] || [];
      ST.medLogs[ST.activeDay] = logs.filter(m => m.id !== id);
      saveSt();
      renderToday();
    }

    function epicAdd() {
      const name = document.getElementById('epic_item').value.trim();
      const cat = document.getElementById('epic_cat').value;
      if (!name) return;
      const id = 'epic_' + Date.now();
      if (!ST.epicItems) ST.epicItems = [];
      ST.epicItems.push({id, name, cat, checked: false});
      document.getElementById('epic_item').value = '';
      saveSt();
      renderEpic();
    }

    function epicToggle(id) {
      const item = ST.epicItems.find(it => it.id === id);
      if (item) item.checked = !item.checked;
      saveSt();
      renderEpic();
    }

    function epicDel(id) {
      ST.epicItems = (ST.epicItems || []).filter(it => it.id !== id);
      saveSt();
      renderEpic();
    }

    function epicClearChecked() {
      ST.epicItems = (ST.epicItems || []).filter(it => !it.checked);
      saveSt();
      renderEpic();
    }

    function setEpicMode(mode) {
      ST.epicMode = mode;
      saveSt();
      renderEpic();
    }

    function setEpicCat(cat) {
      ST.epicCat = cat;
      saveSt();
      renderEpic();
    }

    function saveMenu(dateKey, meal, val) {
      if (!ST.menus) ST.menus = {};
      if (!ST.menus[dateKey]) ST.menus[dateKey] = {};
      ST.menus[dateKey][meal] = val;
      saveSt();
    }

    function menuNavWeek(dir) {
      ST.menuWeekOffset = (ST.menuWeekOffset || 0) + dir;
      saveSt();
      renderEpic();
    }

    function navWeek(dir) {
      ST.weekOffset = (ST.weekOffset || 0) + dir;
      saveSt();
      renderWeek();
    }

    function setWeekDays(days) {
      ST.weekDays = days;
      saveSt();
      renderWeek();
    }

    function toggleDayCard(el) {
      el.classList.toggle('open');
      el.nextElementSibling.classList.toggle('open');
    }

    function shiftActiveDay(dir) {
      ST.activeDay = shiftDay(ST.activeDay, dir);
      ST.santeDate = ST.activeDay;
      saveSt();
      renderToday();
    }

    function switchTab(name) {
      const btns = document.querySelectorAll('.tab-btn');
      btns.forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      if (name === 'jour') renderToday();
      else if (name === 'sem') renderWeek();
      else if (name === 'epic') renderEpic();
      else if (name === 'sante') renderSante();
      else if (name === 'config') renderConfig();
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      ST.dark = document.body.classList.contains('dark');
      saveSt();
    }

    window.addEventListener('load', function() {
      if (ST.dark) document.body.classList.add('dark');
      ST.activeDay = ST.activeDay || todayKey();
      ST.santeDate = ST.santeDate || todayKey();
      saveSt();
      renderToday();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW fail', err));
      }
    });
  </script>
</body>
</html>
